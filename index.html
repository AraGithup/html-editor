<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 可视化编辑器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 顶部工具栏 ── */
  #toolbar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  #toolbar .logo {
    font-weight: 700;
    font-size: 15px;
    color: #333;
    margin-right: 12px;
  }

  #toolbar .current-file {
    font-size: 13px;
    color: #666;
    margin-right: 12px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
    white-space: nowrap;
  }

  #toolbar .sep {
    width: 1px;
    height: 24px;
    background: #ddd;
    margin: 0 4px;
  }

  .tb-btn {
    border: 1px solid #ddd;
    background: #fafafa;
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
    color: #333;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: #e8f0fe; border-color: #4285f4; color: #4285f4; }
  .tb-btn.active { background: #4285f4; border-color: #4285f4; color: #fff; font-weight: 600; }
  .tb-btn.icon { font-weight: 700; padding: 4px 8px; min-width: 30px; text-align: center; }

  .tb-label { font-size: 12px; color: #888; white-space: nowrap; }

  #font-size-input {
    width: 56px;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
    text-align: center;
  }
  #font-size-input:focus { outline: none; border-color: #4285f4; }

  #color-picker {
    width: 32px;
    height: 30px;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 2px;
    cursor: pointer;
    background: none;
  }

  #font-family-select {
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 4px 6px;
    font-size: 13px;
    background: #fafafa;
    cursor: pointer;
  }
  #font-family-select:focus { outline: none; border-color: #4285f4; }

  .btn-upload {
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
  }
  .btn-upload:hover { background: #3367d6; }

  .btn-download {
    background: #34a853;
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background .15s;
  }
  .btn-download:hover { background: #2d8f47; }
  .btn-download:disabled { background: #aaa; cursor: not-allowed; }

  /* ── 警告条 ── */
  #warning-bar {
    display: none;
    background: #fff3cd;
    border-bottom: 1px solid #ffc107;
    padding: 6px 16px;
    font-size: 12px;
    color: #856404;
    flex-shrink: 0;
  }

  /* ── 主区域 ── */
  #main {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── 上传区 ── */
  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #f0f2f5;
  }

  .drop-box {
    border: 2px dashed #bbb;
    border-radius: 16px;
    padding: 60px 80px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .drop-box:hover, .drop-box.drag-over {
    border-color: #4285f4;
    background: #e8f0fe;
  }
  .drop-box .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-box h2 { font-size: 18px; color: #333; margin-bottom: 8px; }
  .drop-box p { font-size: 13px; color: #888; }

  /* ── 编辑器 iframe ── */
  #editor-frame {
    display: none;
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  /* ── 媒体悬停提示 ── */
  #media-hint {
    display: none;
    position: fixed;
    background: rgba(0,0,0,.7);
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<!-- 工具栏 -->
<div id="toolbar">
  <span class="logo">✏️ HTML 编辑器</span>
  <span class="current-file" id="current-filename"></span>
  <input type="file" id="file-input" accept=".html,.htm" style="display:none">
  <input type="file" id="folder-input" webkitdirectory multiple style="display:none">

  <div class="sep"></div>

  <button class="tb-btn icon" id="btn-back" title="返回上一页" disabled>◀</button>
  <button class="tb-btn icon" id="btn-forward" title="前进下一页" disabled>▶</button>

  <div class="sep"></div>

  <button class="tb-btn icon" id="btn-bold" title="加粗 (Ctrl+B)"><b>B</b></button>
  <button class="tb-btn icon" id="btn-italic" title="斜体 (Ctrl+I)"><i>I</i></button>
  <button class="tb-btn icon" id="btn-underline" title="下划线 (Ctrl+U)"><u>U</u></button>
  <button class="tb-btn icon" id="btn-strikethrough" title="删除线"><s>S</s></button>

  <div class="sep"></div>

  <span class="tb-label">字号</span>
  <input type="number" id="font-size-input" value="16" min="8" max="120" title="字号 (px)">
  <button class="tb-btn" id="btn-apply-size" title="应用字号">应用</button>

  <div class="sep"></div>

  <span class="tb-label">颜色</span>
  <input type="color" id="color-picker" value="#000000" title="字体颜色">

  <div class="sep"></div>

  <span class="tb-label">字体</span>
  <select id="font-family-select">
    <option value="">默认</option>
    <option value="Arial, sans-serif">Arial</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
    <option value="'Courier New', monospace">Courier New</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="'Microsoft YaHei', '微软雅黑', sans-serif">微软雅黑</option>
    <option value="'PingFang SC', '苹方', sans-serif">苹方</option>
    <option value="'Noto Sans SC', sans-serif">Noto Sans SC</option>
  </select>

  <div class="sep"></div>

  <button class="tb-btn" id="btn-align-left" title="左对齐">≡ 左</button>
  <button class="tb-btn" id="btn-align-center" title="居中">≡ 中</button>
  <button class="tb-btn" id="btn-align-right" title="右对齐">≡ 右</button>

  <button class="btn-download" id="btn-overwrite" disabled onclick="overwriteOriginal()" style="background:#f4a300;margin-left:auto;">更新原稿</button>
  <button class="btn-download" id="btn-download" disabled onclick="downloadHTML()" style="margin-left:8px;">保存副本</button>
</div>

<!-- 警告条 -->
<div id="warning-bar" id="warning-bar">
  ⚠️ 检测到外部资源引用（CSS/JS/图片相对路径），这些资源在编辑器中可能无法加载，但不影响编辑和保存。
</div>

<!-- 主区域 -->
<div id="main">
  <!-- 上传区 -->
  <div id="drop-zone">
    <div style="display:flex;gap:24px;align-items:stretch;justify-content:center;">
      <div class="drop-box" id="drop-box-file" style="flex:1;max-width:280px;cursor:pointer;" onclick="pickSingleFile()">
        <div class="icon">📄</div>
        <h2>上传 HTML</h2>
        <p>单个 .html 文件</p>
      </div>
      <div class="drop-box" id="drop-box-folder" style="flex:1;max-width:280px;cursor:pointer;" onclick="pickFolder()">
        <div class="icon">📁</div>
        <h2>上传文件夹</h2>
        <p>含图片 / 视频等资源</p>
      </div>
    </div>
  </div>

  <!-- 编辑 iframe -->
  <iframe id="editor-frame" sandbox="allow-same-origin allow-scripts"></iframe>
</div>

<!-- 媒体悬停提示 -->
<div id="media-hint">点击替换图片/视频</div>

<!-- 隐藏文件输入（媒体替换用） -->
<input type="file" id="media-file-input" style="display:none">

<script>
// ── 状态 ──
let currentMediaId = null;
let currentMediaTag = null;
let isEditing = false;
let assetMap = {};
let isFolderUpload = false;
let originalFiles = {};   // filename → File 对象
let fileHandles = {};     // filename → FileSystemFileHandle（File System Access API）
let dirHandle = null;     // FileSystemDirectoryHandle（文件夹上传时）
let allPages = {};       // filename → html 字符串（文件夹上传时所有 HTML）

// ── 页面历史栈 ──
// 每条记录：{html, filename, snapshot}
// html = 原始 HTML（用于跨文件跳转）
// snapshot = 点击后的 DOM 快照（用于单页应用内状态）
let pageStack = [];
let stackIndex = -1;

function updateNavButtons() {
  document.getElementById('btn-back').disabled = stackIndex <= 0;
  document.getElementById('btn-forward').disabled = stackIndex >= pageStack.length - 1;
}

function pushPage(html, filename, snapshot) {
  pageStack = pageStack.slice(0, stackIndex + 1);
  pageStack.push({ html: html, filename: filename, snapshot: snapshot || null, originalHtml: html });
  stackIndex = pageStack.length - 1;
  updateNavButtons();
}

function renderPage(html) {
  var injected = injectEditScript(html);
  var frame = document.getElementById('editor-frame');
  frame.srcdoc = injected;
  updateFilenameDisplay();
}

function renderSnapshot(snapshot) {
  var frame = document.getElementById('editor-frame');
  frame.srcdoc = injectEditScript(snapshot);
  updateFilenameDisplay();
}

function updateFilenameDisplay() {
  var entry = pageStack[stackIndex];
  var el = document.getElementById('current-filename');
  el.textContent = entry ? entry.filename : '';
}

// ── 注入到用户 HTML 的编辑脚本 ──
const INJECT_SCRIPT = `
<script id="__editor_inject__">
(function() {
  // body 设为可编辑
  document.body.contentEditable = 'true';
  document.body.spellcheck = false;

  // 给所有媒体元素打 ID
  document.querySelectorAll('img, video, source').forEach(function(el, i) {
    el.dataset.editorId = 'media_' + i;
  });

  // 链接/按钮交互：
  // - 直接点击 → 触发跳转/onclick
  // - hover 停留 800ms 后进入编辑模式，此时点击 → 编辑文字
  var _hoverEditEl = null;
  var _hoverTimer = null;

  function setHoverEdit(el) {
    _hoverEditEl = el;
    el.style.outline = '2px dashed #4285f4';
    el.style.cursor = 'text';
  }
  function clearHoverEdit(el) {
    if (el) { el.style.outline = ''; el.style.cursor = ''; }
    _hoverEditEl = null;
  }

  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('a, button');
    if (!el || el.dataset.editorBtn) return;
    if (_hoverTimer) clearTimeout(_hoverTimer);
    _hoverTimer = setTimeout(function() { setHoverEdit(el); }, 800);
  }, true);

  document.addEventListener('mouseout', function(e) {
    var el = e.target.closest('a, button');
    if (!el || el.dataset.editorBtn) return;
    if (_hoverTimer) { clearTimeout(_hoverTimer); _hoverTimer = null; }
    if (_hoverEditEl === el) clearHoverEdit(el);
  }, true);

  // click 拦截
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (a && !a.dataset.editorBtn) {
      e.preventDefault();
      if (_hoverEditEl !== a) {
        var href = a.getAttribute('href');
        if (href && href !== '#' && !href.startsWith('javascript')) {
          window.parent.postMessage({ type: 'NAVIGATE', href: href }, '*');
        }
      }
      return;
    }
    var btn = e.target.closest('button');
    if (btn && !btn.dataset.editorBtn) {
      if (_hoverEditEl === btn) {
        e.preventDefault();
        e.stopImmediatePropagation();
      }
    }
  }, true);

  // 给图片/视频加替换按钮
  function addMediaOverlay(el) {
    if (el.dataset.overlayAdded) return;
    el.dataset.overlayAdded = '1';
    var wrapper = document.createElement('span');
    wrapper.style.cssText = 'position:relative;display:inline-block;';
    el.parentNode.insertBefore(wrapper, el);
    wrapper.appendChild(el);
    var btn = document.createElement('span');
    btn.textContent = '🔄 替换';
    btn.style.cssText = 'position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:3px 8px;border-radius:4px;cursor:pointer;z-index:9999;user-select:none;pointer-events:auto;';
    btn.contentEditable = 'false';
    btn.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      window.parent.postMessage({ type: 'MEDIA_CLICK', tag: el.tagName, id: el.dataset.editorId }, '*');
    });
    wrapper.appendChild(btn);
  }
  document.querySelectorAll('img, video').forEach(addMediaOverlay);

  // 给链接/按钮加"编辑链接"覆盖按钮
  function addLinkOverlay(el) {
    if (el.dataset.linkOverlayAdded) return;
    el.dataset.linkOverlayAdded = '1';
    var wrapper = document.createElement('span');
    wrapper.style.cssText = 'position:relative;display:inline-block;';
    el.parentNode.insertBefore(wrapper, el);
    wrapper.appendChild(el);
    var btn = document.createElement('span');
    btn.textContent = '🔗 编辑链接';
    btn.style.cssText = 'position:absolute;top:-22px;left:0;background:rgba(66,133,244,.9);color:#fff;font-size:11px;padding:2px 7px;border-radius:4px;cursor:pointer;z-index:9999;user-select:none;pointer-events:auto;white-space:nowrap;';
    btn.contentEditable = 'false';
    btn.dataset.editorBtn = '1';
    btn.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      window.parent.postMessage({
        type: 'LINK_CLICK',
        id: el.dataset.linkId,
        tag: el.tagName,
        href: el.tagName === 'A' ? (el.getAttribute('href') || '') : '',
        onclick: el.getAttribute('onclick') || ''
      }, '*');
    });
    wrapper.appendChild(btn);
  }
  document.querySelectorAll('a, button').forEach(function(el, i) {
    el.dataset.linkId = 'link_' + i;
    addLinkOverlay(el);
  });

  // 双击替换媒体（兜底）
  document.addEventListener('dblclick', function(e) {
    var media = e.target.closest('img, video');
    if (!media) return;
    e.preventDefault(); e.stopPropagation();
    window.parent.postMessage({ type: 'MEDIA_CLICK', tag: media.tagName, id: media.dataset.editorId }, '*');
  });

  // ── 页面内状态快照（单页应用前进/返回） ──
  document.addEventListener('click', function(e) {
    if (e.target.closest('[data-editor-btn]') || e.target.dataset.editorBtn) return;
    if (_hoverEditEl) return;
    setTimeout(function() {
      window.parent.postMessage({ type: 'DOM_SNAPSHOT', html: document.documentElement.outerHTML }, '*');
    }, 80);
  }, true);

  // ── 收集用户编辑变化，发给父页面用于保存 ──
  function getXPath(el) {
    if (el.nodeType === 3) {
      // 文本节点：找它是父元素的第几个文本节点
      var parent = el.parentElement;
      var idx = 0;
      parent.childNodes.forEach(function(n) { if (n === el) return; if (n.nodeType === 3) idx++; });
      return getXPath(parent) + '/text()[' + (idx + 1) + ']';
    }
    var path = '';
    while (el && el.nodeType === 1 && el !== document.documentElement) {
      var tag = el.tagName.toLowerCase();
      var siblings = Array.prototype.filter.call(el.parentElement.children, function(c) { return c.tagName === el.tagName; });
      var pos = siblings.indexOf(el) + 1;
      path = '/' + tag + '[' + pos + ']' + path;
      el = el.parentElement;
    }
    return '/html' + path;
  }

  document.addEventListener('input', function(e) {
    var target = e.target;
    // 找到被编辑的文本节点所在元素
    var sel = window.getSelection();
    if (sel && sel.anchorNode && sel.anchorNode.nodeType === 3) {
      var textNode = sel.anchorNode;
      var parent = textNode.parentElement;
      if (!parent) return;
      var xpath = getXPath(parent);
      window.parent.postMessage({
        type: 'EDIT_CHANGE',
        xpath: xpath,
        innerHTML: parent.innerHTML
      }, '*');
    }
  }, true);

})();
<\/script>`;


function injectEditScript(html) {
  if (/<\/body>/i.test(html)) {
    return html.replace(/<\/body>/i, INJECT_SCRIPT + '</body>');
  }
  return html + INJECT_SCRIPT;
}

// ── 上传选择器 ──
function showUploadPicker() { pickFolder(); }

// ── 单文件上传 ──
async function pickSingleFile() {
  if (window.showOpenFilePicker) {
    try {
      var [handle] = await window.showOpenFilePicker({ types: [{ description: 'HTML', accept: { 'text/html': ['.html', '.htm'] } }] });
      var file = await handle.getFile();
      fileHandles = {}; fileHandles[file.name] = handle;
      dirHandle = null;
      assetMap = {}; isFolderUpload = false;
      loadHTMLFile(file);
    } catch (e) { /* 用户取消 */ }
  } else {
    document.getElementById('file-input').click();
  }
}

// ── 文件夹上传 ──
async function pickFolder() {
  if (window.showDirectoryPicker) {
    try {
      var dh = await window.showDirectoryPicker({ mode: 'readwrite' });
      dirHandle = dh;
      fileHandles = {};
      var files = [];
      await collectDirFiles(dh, dh.name, files);
      simulateFolderUpload(files);
    } catch (e) { /* 用户取消 */ }
  } else {
    document.getElementById('folder-input').click();
  }
}

async function collectDirFiles(dirH, rootName, files) {
  for await (var entry of dirH.values()) {
    if (entry.kind === 'file') {
      var file = await entry.getFile();
      var relPath = dirH === dirHandle ? entry.name : (dirH._relPath || '') + '/' + entry.name;
      file._relativePath = relPath.replace(/^\//, '');
      if (/\.html?$/i.test(entry.name)) fileHandles[entry.name] = entry;
      files.push(file);
    } else if (entry.kind === 'directory') {
      entry._relPath = (dirH._relPath || '') + '/' + entry.name;
      await collectDirFiles(entry, rootName, files);
    }
  }
}

// ── 降级：<input> 上传 ──
document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (file) { fileHandles = {}; dirHandle = null; assetMap = {}; isFolderUpload = false; loadHTMLFile(file); }
  this.value = '';
});

document.getElementById('folder-input').addEventListener('change', function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  this.value = '';
  files.forEach(function(f) {
    if (f.webkitRelativePath) f._relativePath = f.webkitRelativePath.split('/').slice(1).join('/');
  });
  fileHandles = {}; dirHandle = null;
  simulateFolderUpload(files);
});

// 多 HTML 文件时弹出选择器
function showHTMLPicker(htmlFiles) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:32px;min-width:320px;max-width:480px;';
  box.innerHTML = '<h3 style="margin-bottom:16px;font-size:16px;">选择要编辑的 HTML 文件</h3>';
  htmlFiles.forEach(function(file) {
    var btn = document.createElement('button');
    var relPath = file.webkitRelativePath
      ? file.webkitRelativePath.split('/').slice(1).join('/')
      : file.name;
    btn.textContent = relPath;
    btn.style.cssText = 'display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer;font-size:14px;';
    btn.onmouseover = function() { btn.style.background = '#e8f0fe'; btn.style.borderColor = '#4285f4'; };
    btn.onmouseout = function() { btn.style.background = '#fafafa'; btn.style.borderColor = '#ddd'; };
    btn.onclick = function() {
      document.body.removeChild(overlay);
      loadHTMLFile(file);
    };
    box.appendChild(btn);
  });
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

// 拖拽上传（支持文件夹）
var dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  document.getElementById('drop-box-file').classList.add('drag-over');
  document.getElementById('drop-box-folder').classList.add('drag-over');
});
dropZone.addEventListener('dragleave', function(e) {
  if (!dropZone.contains(e.relatedTarget)) {
    document.getElementById('drop-box-file').classList.remove('drag-over');
    document.getElementById('drop-box-folder').classList.remove('drag-over');
  }
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  document.getElementById('drop-box-file').classList.remove('drag-over');
  document.getElementById('drop-box-folder').classList.remove('drag-over');
  // 优先处理文件夹（DataTransferItemList API）
  var items = e.dataTransfer.items;
  if (items && items.length) {
    for (var i = 0; i < items.length; i++) {
      var entry = items[i].webkitGetAsEntry && items[i].webkitGetAsEntry();
      if (entry && entry.isDirectory) {
        readDirectory(entry, function(files) {
          simulateFolderUpload(files);
        });
        return;
      }
    }
  }
  // 单文件拖拽
  var file = e.dataTransfer.files[0];
  if (file && /\.html?$/i.test(file.name)) {
    assetMap = {};
    isFolderUpload = false;
    loadHTMLFile(file);
  }
});

// 递归读取拖拽文件夹
function readDirectory(dirEntry, callback) {
  var files = [];
  var reader = dirEntry.createReader();
  function readEntries() {
    reader.readEntries(function(entries) {
      if (!entries.length) { callback(files); return; }
      var pending = entries.length;
      entries.forEach(function(entry) {
        if (entry.isFile) {
          entry.file(function(f) {
            // 附加相对路径信息
            f._relativePath = entry.fullPath.replace(/^\/[^/]+\//, '');
            files.push(f);
            if (--pending === 0) readEntries();
          });
        } else if (entry.isDirectory) {
          readDirectory(entry, function(subFiles) {
            files = files.concat(subFiles);
            if (--pending === 0) readEntries();
          });
        } else {
          if (--pending === 0) readEntries();
        }
      });
    });
  }
  readEntries();
}

function simulateFolderUpload(files) {
  var nonHtml = files.filter(function(f) { return !/\.html?$/i.test(f.name); });
  var htmlFiles = files.filter(function(f) { return /\.html?$/i.test(f.name); });
  if (!htmlFiles.length) { alert('文件夹中没有找到 HTML 文件'); return; }
  assetMap = {};
  allPages = {};
  isFolderUpload = true;
  var pending = nonHtml.length + htmlFiles.length;
  function onReady() {
    if (htmlFiles.length === 1) loadHTMLFile(htmlFiles[0]);
    else showHTMLPicker(htmlFiles);
  }
  // 读取所有非 HTML 资源
  nonHtml.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var key = file._relativePath || file.name;
      assetMap[key] = ev.target.result;
      assetMap[file.name] = ev.target.result;
      if (--pending === 0) onReady();
    };
    reader.readAsDataURL(file);
  });
  // 读取所有 HTML 文件，存入 allPages
  htmlFiles.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      allPages[file.name] = ev.target.result;
      originalFiles[file.name] = file;
      if (--pending === 0) onReady();
    };
    reader.readAsText(file, 'UTF-8');
  });
  if (!pending) onReady();
}

function loadHTMLFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var html = e.target.result;
    // 把 HTML 中的相对路径资源替换为 base64
    html = inlineAssets(html);
    checkExternalResources(html);
    pageStack = [];
    stackIndex = -1;
    pushPage(html, file.name);
    renderPage(html);
    document.getElementById('editor-frame').style.display = 'block';
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('btn-download').disabled = false;
    document.getElementById('btn-overwrite').disabled = false;
    originalFiles[file.name] = file;
    isEditing = true;
  };
  reader.readAsText(file, 'UTF-8');
}

// 把 HTML 中相对路径的 src/href 替换为 assetMap 中的 base64
function inlineAssets(html) {
  if (!Object.keys(assetMap).length) return html;
  // 替换 src="..." 和 href="..."（跳过 http/https/data:/# 开头的）
  return html.replace(/(src|href)=["']([^"']+)["']/gi, function(match, attr, val) {
    if (/^(https?:|data:|#|javascript)/i.test(val)) return match;
    // 尝试匹配：完整相对路径 或 仅文件名
    var base64 = assetMap[val] || assetMap[val.split('/').pop()];
    if (base64) return attr + '="' + base64 + '"';
    return match;
  });
}

function checkExternalResources(html) {
  var hasExternal = /<link\s[^>]*href=["'][^"'#][^"']*["']/i.test(html) ||
                    /<script\s[^>]*src=["'][^"'http][^"']*["']/i.test(html);
  document.getElementById('warning-bar').style.display = hasExternal ? 'block' : 'none';
}

// ── 前进/后退/撤销 ──
document.getElementById('btn-back').addEventListener('click', function() {
  if (stackIndex <= 0) return;
  saveCurrentPage();
  stackIndex--;
  var entry = pageStack[stackIndex];
  if (entry.snapshot) renderSnapshot(entry.snapshot);
  else renderPage(entry.html);
  updateNavButtons();
});

document.getElementById('btn-forward').addEventListener('click', function() {
  if (stackIndex >= pageStack.length - 1) return;
  saveCurrentPage();
  stackIndex++;
  var entry = pageStack[stackIndex];
  if (entry.snapshot) renderSnapshot(entry.snapshot);
  else renderPage(entry.html);
  updateNavButtons();
});

// 保存当前 iframe 内容到历史栈
function saveCurrentPage() {
  if (!isEditing || stackIndex < 0) return;
  var frame = document.getElementById('editor-frame');
  var doc = frame.contentDocument;
  if (!doc) return;
  var html = serializeHTML(doc);
  // editedHtml 存编辑内容，html 保持初始值（用于渲染初始状态）
  pageStack[stackIndex].editedHtml = html;
}

// ── postMessage 接收 ──
window.addEventListener('message', function(e) {
  if (e.data.type === 'MEDIA_CLICK') {
    currentMediaId = e.data.id;
    currentMediaTag = e.data.tag;
    var input = document.getElementById('media-file-input');
    input.accept = (e.data.tag === 'IMG') ? 'image/*' : 'video/*';
    input.click();
  } else if (e.data.type === 'LINK_CLICK') {
    showLinkEditor(e.data);
  } else if (e.data.type === 'NAVIGATE') {
    var href = e.data.href;
    if (/^https?:\/\//i.test(href)) {
      window.open(href, '_blank');
      return;
    }
    // 내부 링크: allPages에서 찾아 pushPage로 히스토리에 추가
    var basename = href.replace(/^.*\//, '').replace(/[?#].*$/, '');
    var targetFilename = allPages[basename] ? basename : (allPages[href] ? href : null);
    if (targetFilename) {
      saveCurrentPage();
      var html = inlineAssets(allPages[targetFilename]);
      pushPage(html, targetFilename);
      renderPage(html);
    } else if (href && href !== '#') {
      alert('检测到页面跳转：' + href + '\n\n目标页面未上传，请通过"上传文件夹"一次性加载整个项目。');
    }
  } else if (e.data.type === 'MEDIA_HOVER') {
    document.getElementById('media-hint').style.display = e.data.show ? 'block' : 'none';
  } else if (e.data.type === 'DOM_SNAPSHOT') {
    var cur = pageStack[stackIndex];
    if (!cur) return;
    var snap = e.data.html;
    // 去掉注入脚本，避免重复注入
    snap = snap.replace(/<script[^>]*id="__editor_inject__"[\s\S]*?<\/script>/i, '');
    // 把当前状态存为新的历史帧（截断前进历史）
    pageStack = pageStack.slice(0, stackIndex + 1);
    pageStack.push({ html: cur.html, filename: cur.filename, snapshot: snap, originalHtml: cur.originalHtml, edits: cur.edits ? cur.edits.slice() : [] });
    stackIndex = pageStack.length - 1;
    updateNavButtons();
  } else if (e.data.type === 'EDIT_CHANGE') {
    var cur = pageStack[stackIndex];
    if (!cur) return;
    if (!cur.edits) cur.edits = [];
    // 更新或追加（同一 xpath 只保留最新值）
    var found = false;
    for (var ei = 0; ei < cur.edits.length; ei++) {
      if (cur.edits[ei].xpath === e.data.xpath && cur.edits[ei].type === 'innerHTML') {
        cur.edits[ei].innerHTML = e.data.innerHTML;
        found = true; break;
      }
    }
    if (!found) cur.edits.push({ type: 'innerHTML', xpath: e.data.xpath, innerHTML: e.data.innerHTML });
  }
});

// ── 链接/按钮编辑弹窗 ──
function showLinkEditor(data) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;';
  var isBtn = data.tag === 'BUTTON';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:28px;width:440px;';
  box.innerHTML = `
    <h3 style="margin-bottom:16px;font-size:15px;">编辑${isBtn ? '按钮' : '链接'}跳转逻辑</h3>
    ${!isBtn ? `
    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px;">跳转地址 (href)</label>
    <input id="le-href" type="text" value="${escAttr(data.href)}" placeholder="https://... 或 page.html 或 #section"
      style="width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:13px;margin-bottom:16px;box-sizing:border-box;">
    ` : ''}
    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px;">onclick 事件代码</label>
    <textarea id="le-onclick" rows="4" placeholder="例：alert('hello') 或留空"
      style="width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:12px;font-family:monospace;resize:vertical;box-sizing:border-box;">${escText(data.onclick)}</textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button id="le-cancel" style="padding:8px 20px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer;font-size:14px;">取消</button>
      <button id="le-confirm" style="padding:8px 20px;border:none;border-radius:6px;background:#4285f4;color:#fff;cursor:pointer;font-size:14px;font-weight:500;">确认</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  document.getElementById('le-cancel').onclick = function() { document.body.removeChild(overlay); };
  document.getElementById('le-confirm').onclick = function() {
    var newHref = !isBtn && document.getElementById('le-href') ? document.getElementById('le-href').value.trim() : null;
    var newOnclick = document.getElementById('le-onclick').value.trim();
    var frame = document.getElementById('editor-frame');
    var el = frame.contentDocument.querySelector('[data-link-id="' + data.id + '"]');
    if (el) {
      if (newHref !== null) el.setAttribute('href', newHref);
      if (newOnclick) el.setAttribute('onclick', newOnclick);
      else el.removeAttribute('onclick');
    }
    document.body.removeChild(overlay);
  };
}

function escAttr(s) { return (s || '').replace(/"/g, '&quot;'); }
function escText(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// 鼠标跟随提示
document.addEventListener('mousemove', function(e) {
  var hint = document.getElementById('media-hint');

// ── 媒体替换 ──
document.getElementById('media-file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file || !currentMediaId) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var frame = document.getElementById('editor-frame');
    var el = frame.contentDocument.querySelector('[data-editor-id="' + currentMediaId + '"]');
    if (el) {
      if (el.tagName === 'VIDEO') {
        el.src = ev.target.result;
        el.load();
      } else {
        el.src = ev.target.result;
      }
    }
    currentMediaId = null;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// ── 工具栏操作 ──
function execInFrame(cmd, value) {
  if (!isEditing) return;
  var doc = document.getElementById('editor-frame').contentDocument;
  doc.execCommand(cmd, false, value || null);
  doc.getElementById('editor-frame-body') && doc.getElementById('editor-frame-body').focus();
}

document.getElementById('btn-bold').addEventListener('click', function() {

});

function applyFontSize() {
  if (!isEditing) return;
  var px = parseInt(document.getElementById('font-size-input').value, 10);
  if (!px || px < 1) return;
  var doc = document.getElementById('editor-frame').contentDocument;
  var sel = doc.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

  // 用 fontSize=7 占位，再替换为 inline style
  doc.execCommand('fontSize', false, '7');
  doc.querySelectorAll('font[size="7"]').forEach(function(el) {
    el.removeAttribute('size');
    el.style.fontSize = px + 'px';
  });
}

function updateToolbarState() {
  if (!isEditing) return;
  var doc = document.getElementById('editor-frame').contentDocument;
  document.getElementById('btn-bold').classList.toggle('active', doc.queryCommandState('bold'));
  document.getElementById('btn-italic').classList.toggle('active', doc.queryCommandState('italic'));
  document.getElementById('btn-underline').classList.toggle('active', doc.queryCommandState('underline'));
  document.getElementById('btn-strikethrough').classList.toggle('active', doc.queryCommandState('strikeThrough'));
}

// iframe 加载完成后监听 selectionchange
document.getElementById('editor-frame').addEventListener('load', function() {
  var doc = this.contentDocument;
  if (!doc || !doc.body) return;
  doc.addEventListener('selectionchange', updateToolbarState);
  doc.addEventListener('keyup', updateToolbarState);
});

// ── 序列化（清理注入痕迹） ──
function serializeHTML(doc) {
  var html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  html = html.replace(/<script id="__editor_inject__">[\s\S]*?<\/script>/g, '');
  html = html.replace(/\s*contenteditable="true"/gi, '');
  html = html.replace(/\s*spellcheck="false"/gi, '');
  html = html.replace(/\s*data-editor-id="[^"]*"/gi, '');
  html = html.replace(/\s*data-overlay-added="[^"]*"/gi, '');
  html = html.replace(/\s*data-link-id="[^"]*"/gi, '');
  html = html.replace(/\s*data-link-overlay-added="[^"]*"/gi, '');
  html = html.replace(/\s*data-bg-id="[^"]*"/gi, '');
  html = html.replace(/\s*data-bg-overlay-added="[^"]*"/gi, '');
  // 清理替换按钮覆盖层（wrapper span + 🔄按钮），还原原始 img/video
  html = html.replace(/<span style="position:relative;display:inline-block;">([\s\S]*?)<span style="position:absolute[^"]*"[^>]*>🔄 替换<\/span><\/span>/g, function(_, inner) {
    return inner.trim();
  });
  return html;
}

// ── 更新原稿（直接覆盖原文件，不支持时降级下载） ──
async function overwriteOriginal() {
  if (!isEditing) return;
  saveCurrentPage();

  var seen = {};
  var pages = [];
  for (var i = pageStack.length - 1; i >= 0; i--) {
    var p = pageStack[i];
    if (!seen[p.filename]) { seen[p.filename] = true; pages.unshift(p); }
  }

  var canWrite = !!window.showSaveFilePicker;
  var saved = 0, failed = 0;

  for (var j = 0; j < pages.length; j++) {
    var page = pages[j];
    // 用原始 HTML 作为基础，把编辑内容 patch 进去
    var edits = page.edits || [];
    var baseHtml = edits.length > 0 ? applyEditsToOriginal(page.originalHtml, edits) : page.originalHtml;
    var html = isFolderUpload ? restoreRelativePaths(baseHtml) : baseHtml;
    var handle = fileHandles[page.filename];

    if (canWrite && handle) {
      try {
        var writable = await handle.createWritable();
        await writable.write(html);
        await writable.close();
        saved++;
        continue;
      } catch (e) { /* 权限被拒，降级 */ }
    }

    (function(h, fn) {
      var blob = new Blob([h], { type: 'text/html;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fn;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      failed++;
    })(html, page.filename);
  }

  if (saved > 0 && failed === 0) {
    var btn = document.getElementById('btn-overwrite');
    var orig = btn.textContent;
    btn.textContent = '✓ 已保存';
    btn.disabled = true;
    setTimeout(function() { btn.textContent = orig; btn.disabled = false; }, 1000);
  }
}

// 把收集到的编辑变化 patch 到 originalHtml 上
function applyEditsToOriginal(originalHtml, edits) {
  if (!edits || edits.length === 0) return originalHtml;
  var parser = new DOMParser();
  var origDoc = parser.parseFromString(originalHtml, 'text/html');

  edits.forEach(function(edit) {
    try {
      var result = origDoc.evaluate(edit.xpath, origDoc, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null);
      var el = result.singleNodeValue;
      if (!el) return;
      if (edit.type === 'innerHTML') {
        el.innerHTML = edit.innerHTML;
      }
    } catch(e) {}
  });

  return '<!DOCTYPE html>\n' + origDoc.documentElement.outerHTML;
}

function downloadHTML() {

function showSaveDialog() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;';

  box.innerHTML = `

    <p style="font-size:13px;color:#666;margin-bottom:20px;">如何处理 HTML 中的图片和视频资源？</p>
    <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:2px solid #4285f4;border-radius:8px;cursor:pointer;margin-bottom:10px;background:#f0f6ff;">
      <input type="radio" name="saveMode" value="inline" checked style="margin-top:2px;flex-shrink:0;">

        <span style="font-size:12px;color:#666;">所有图片/视频转为 base64 写入 HTML，文件可独立使用，但体积较大。</span>
      </span>
    </label>
    <label style="display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid #ddd;border-radius:8px;cursor:pointer;margin-bottom:24px;background:#fafafa;">
      <input type="radio" name="saveMode" value="relative" style="margin-top:2px;flex-shrink:0;">
      <span>
        <strong style="font-size:14px;">保持相对路径</strong><br>
        <span style="font-size:12px;color:#666;">只内嵌手动替换过的资源，其余保持原路径。文件体积小，但需与资源文件夹一起使用。</span>
      </span>
    </label>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="save-cancel" style="padding:8px 20px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer;font-size:14px;">取消</button>
      <button id="save-confirm" style="padding:8px 20px;border:none;border-radius:6px;background:#34a853;color:#fff;cursor:pointer;font-size:14px;font-weight:500;">下载</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  box.querySelectorAll('input[name="saveMode"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
      box.querySelectorAll('label').forEach(function(l) {
        if (l.querySelector('input[name="saveMode"]')) {
          l.style.border = '1px solid #ddd';
          l.style.background = '#fafafa';
        }
      });
      radio.closest('label').style.border = '2px solid #4285f4';

  document.getElementById('save-cancel').onclick = function() { document.body.removeChild(overlay); };
  document.getElementById('save-confirm').onclick = function() {
    var mode = box.querySelector('input[name="saveMode"]:checked').value;
    document.body.removeChild(overlay);
    doDownload(mode);
  };
}

function doDownload(mode) {
  saveCurrentPage();
  var pagesToSave = pageStack.map(function(page) {
    if (mode === 'relative') {
      // 把 base64 还原回原始相对路径（仅还原未被用户手动替换的）
      return { html: restoreRelativePaths(page.html), filename: page.filename };
    }
    return page;
  });
  pagesToSave.forEach(function(page, i) {
    setTimeout(function() {
      var blob = new Blob([page.html], { type: 'text/html;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      var ts = new Date().toISOString().slice(0,19).replace(/[:T]/g, '-');
      var base = (page.filename || ('page_' + (i + 1))).replace(/\.html?$/i, '');
      a.download = base + '_edited_' + ts + '.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }, i * 300);
  });
}

// 把 assetMap 中的 base64 还原为原始相对路径
function restoreRelativePaths(html) {
  // 构建反向映射：base64 → 相对路径
  var reverseMap = {};
  Object.keys(assetMap).forEach(function(key) {
    // 只保留相对路径 key（含 / 或不含 / 的文件名），跳过纯文件名重复项
    if (!reverseMap[assetMap[key]]) {
      reverseMap[assetMap[key]] = key;
    }
  });
  return html.replace(/(src|href)="(data:[^"]+)"/gi, function(match, attr, dataUrl) {
    var original = reverseMap[dataUrl];
    if (original) return attr + '="' + original + '"';
    return match;  // 用户手动替换的，保留 base64
  });
}
